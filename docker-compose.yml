version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: aura_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aura_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: aura_redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  pgdata:
