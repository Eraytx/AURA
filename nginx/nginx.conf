events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  upstream nextjs {
    least_conn;
    server web:3000;
  }

  server {
    listen 80;
    server_name aura.com www.aura.com;

    # Certbot verification path
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Redirect to HTTPS
    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl http2;
    server_name aura.com www.aura.com;

    # SSL
    ssl_certificate /etc/nginx/ssl/live/aura.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/aura.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    # Gzip compression
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Static assets (Next.js)
    location /_next/static/ {
      alias /app/apps/web/.next/static/;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # API Proxy
    location /api/ {
      proxy_pass http://nextjs;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 60s;
    }

    # SSE timeout extension
    location /api/stream/ {
      proxy_pass http://nextjs;
      proxy_read_timeout 3600s;
      proxy_buffering off;
      proxy_cache off;
    }

    # Main frontend paths
    location / {
      proxy_pass http://nextjs;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
    }
  }
}
