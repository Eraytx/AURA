name: Database Backup

on:
  schedule:
    - cron: "0 2 * * *" # Every night at 02:00 UTC

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Setup AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: SSH to Host, Dump Database and Upload to S3
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ubuntu
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            FILENAME="aura_backup_$(date +%Y%m%d_%H%M%S).sql.gz"
            docker exec -t app_postgres_1 pg_dump -U postgres aura_prod | gzip > /tmp/$FILENAME
            
            # Export to AWS S3
            aws s3 cp /tmp/$FILENAME s3://${{ secrets.S3_BACKUP_BUCKET }}/backups/$FILENAME
            
            # Cleanup local temp backup
            rm /tmp/$FILENAME
            
            # Delete backups older than 30 days on S3
            aws s3api list-objects --bucket ${{ secrets.S3_BACKUP_BUCKET }} --prefix "backups/" --query "Contents[?LastModified<='$(date -d '30 days ago' +%Y-%m-%d)'].{Key:Key}" --output text | xargs -I {} aws s3 rm s3://${{ secrets.S3_BACKUP_BUCKET }}/{}
